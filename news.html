<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YES Lab — News</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="components.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { COLORS, NEWS } = window;

function App() {
  return (
    <>
      <Nav active="news" />
      <div className="container">
        <div className="page-hero">
          <p className="section-label">Recent Timeline</p>
          <h1 style={{ fontFamily:"var(--font-head)", fontSize:"clamp(40px,5vw,64px)", fontWeight:700, lineHeight:1.1, letterSpacing:"-0.02em" }}>
            News &amp; Updates
          </h1>
        </div>
        <div className="timeline" style={{ marginBottom:100 }}>
          <div className="timeline-line"></div>
          {NEWS.map((item, i) => (
            <div key={i} className="timeline-item">
              <div className="timeline-date">{item.date}</div>
              <div className="timeline-dot" style={{ background: COLORS[item.venueColor].base }}></div>
              <div className="timeline-body">
                <span className="timeline-venue" style={{ background:COLORS[item.venueColor].light, color:COLORS[item.venueColor].base }}>
                  {item.venue}
                </span>
                <h4><a href={item.link}>{item.title}</a></h4>
                {item.authors && <span className="authors">{item.authors}</span>}
              </div>
            </div>
          ))}
        </div>
      </div>
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
