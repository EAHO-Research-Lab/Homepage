<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YES Lab — Publications</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="components.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { COLORS, PUBLICATIONS } = window;

function App() {
  const [filter, setFilter] = React.useState("All");
  const venues = ["All", ...Array.from(new Set(PUBLICATIONS.map(p => p.venue)))];
  const visible = filter === "All" ? PUBLICATIONS : PUBLICATIONS.filter(p => p.venue === filter);

  return (
    <>
      <Nav active="publications" />
      <div className="container">
        <div className="page-hero" style={{ marginBottom:40 }}>
          <p className="section-label">Selected Work</p>
          <h1 style={{ fontFamily:"var(--font-head)", fontSize:"clamp(40px,5vw,64px)", fontWeight:700, lineHeight:1.1, letterSpacing:"-0.02em" }}>
            Publications
          </h1>
        </div>

        <div style={{ display:"flex", gap:10, flexWrap:"wrap", marginBottom:48 }}>
          {venues.map(v => (
            <button key={v} onClick={() => setFilter(v)} style={{
              fontFamily:"var(--font-head)", fontSize:13, fontWeight:600,
              padding:"6px 16px", borderRadius:100, border:"1.5px solid",
              cursor:"pointer", transition:"all .15s",
              background: filter === v ? "var(--green)" : "transparent",
              color: filter === v ? "#fff" : "var(--ink2)",
              borderColor: filter === v ? "var(--green)" : "oklch(82% 0.01 250)",
            }}>{v}</button>
          ))}
        </div>

        <div className="pub-list" style={{ marginBottom:100 }}>
          {visible.map((pub, i) => (
            <div key={i} className="pub-item">
              <div className="pub-year">{pub.year}</div>
              <div>
                <span className="pub-venue" style={{ background:COLORS[pub.venueColor].light, color:COLORS[pub.venueColor].base }}>
                  {pub.venue}
                </span>
                <a href={pub.link} className="pub-title">{pub.title} <ExternalIcon /></a>
                <span className="pub-authors">{pub.authors}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
