<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YES Lab — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="components.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { COLORS, PILLARS, NEWS } = window;

function App() {
  return (
    <>
      <Nav active="home" />

      {/* ── HERO ── */}
      <section className="home-hero">
        <div className="hero-blobs">
          <div className="blob" style={{ width:600, height:600, top:-120, right:-80, background:"var(--teal)" }} />
          <div className="blob" style={{ width:500, height:500, bottom:-100, left:-60, background:"var(--amber)" }} />
          <div className="blob" style={{ width:400, height:400, top:"40%", left:"35%", background:"var(--purple)" }} />
        </div>
        <div className="container hero-content">
          <div className="hero-eyebrow">
            <div className="hero-eyebrow-dot"></div>
            <span className="hero-eyebrow-text">University of South Florida · Department of CSE</span>
          </div>
          <h1 className="hero-title">
            <span className="yes">YES</span> Lab<br />
            <span style={{ fontWeight:300 }}>Efficient &amp; Scalable</span><br />
            <span>AI Systems</span>
          </h1>
          <p className="hero-sub">
            Led by Dr. Yi Sheng, we develop systems that bridge the practice gap
            between AI and domain applications — building AI that is fast, lean,
            and deployable in the real world.
          </p>
          <div className="hero-tags">
            {[
              ["coral","Model Compression"],["teal","Federated Learning"],
              ["purple","Continual Learning"],["amber","Edge AI"],
              ["blue","Neural Architecture Search"],["green","Scalable Systems"],
            ].map(([c,label]) => (
              <span key={label} className="tag" style={{
                background: COLORS[c].light,
                color: COLORS[c].base,
                borderColor: COLORS[c].base + "44",
              }}>{label}</span>
            ))}
          </div>
        </div>
      </section>

      <Marquee />

      {/* ── RESEARCH ── */}
      <section id="research" className="page-section">
        <div className="container">
          <p className="section-label">Research Focus</p>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1.6fr", gap:60, alignItems:"start", marginBottom:64 }}>
            <div>
              <h2 className="section-title" style={{ marginBottom:0 }}>
                Bridging the gap between<br />
                <span style={{ color:"var(--green)" }}>AI research</span> and<br />
                <span style={{ color:"var(--teal)" }}>real-world practice</span>
              </h2>
            </div>
            <p className="mission-text">
              The <strong>YES Lab</strong> develops systems to bridge the practice gap between AI and domain
              applications, with a focus on{" "}
              <span className="hl" style={{ background:"var(--coral-l)", color:"var(--coral)" }}>efficiency</span> and{" "}
              <span className="hl" style={{ background:"var(--teal-l)", color:"var(--teal)" }}>scalability</span>.
              We design algorithms, architectures, and frameworks that make powerful AI
              accessible — from resource-limited edge devices to large-scale distributed systems —
              without sacrificing performance.
            </p>
          </div>
          <div className="pillars-grid">
            {PILLARS.map(p => (
              <div key={p.title} className="pillar-card" style={{
                background: COLORS[p.color].light,
                borderColor: COLORS[p.color].base + "33",
              }}>
                <span className="pillar-icon">{p.icon}</span>
                <h3 style={{ color: COLORS[p.color].base }}>{p.title}</h3>
                <p>{p.desc}</p>
              </div>
            ))}
          </div>

          {/* Recent news preview */}
          <div style={{ marginTop:80 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:32 }}>
              <div>
                <p className="section-label">Latest</p>
                <h2 className="section-title" style={{ marginBottom:0 }}>Recent Updates</h2>
              </div>
              <a href="news.html" className="btn btn-outline" style={{ flexShrink:0 }}>View all news</a>
            </div>
            <div style={{ display:"flex", flexDirection:"column" }}>
              {NEWS.slice(0,3).map((item, i) => (
                <div key={i} style={{
                  display:"grid", gridTemplateColumns:"100px 1fr",
                  gap:"0 28px", padding:"20px 0",
                  borderBottom: i < 2 ? "1px solid oklch(91% 0.005 250)" : "none",
                  alignItems:"start",
                }}>
                  <span style={{ fontFamily:"var(--font-mono)", fontSize:12, color:"var(--ink3)", paddingTop:4 }}>{item.date}</span>
                  <div>
                    <span style={{
                      display:"inline-block", fontFamily:"var(--font-mono)", fontSize:11,
                      fontWeight:700, letterSpacing:".08em", padding:"3px 10px",
                      borderRadius:100, marginBottom:6,
                      background: COLORS[item.venueColor].light, color: COLORS[item.venueColor].base,
                    }}>{item.venue}</span>
                    <p style={{ fontFamily:"var(--font-head)", fontSize:15, fontWeight:600, lineHeight:1.4 }}>
                      <a href={item.link} style={{ color:"var(--ink)", textDecoration:"none" }}
                        onMouseOver={e => e.target.style.color="var(--green)"}
                        onMouseOut={e => e.target.style.color="var(--ink)"}>{item.title}</a>
                    </p>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      </section>

      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
