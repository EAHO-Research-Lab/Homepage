<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>YES Lab — People</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="components.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { COLORS, PEOPLE } = window;

function App() {
  return (
    <>
      <Nav active="people" />
      <div className="container">
        <div className="page-hero">
          <p className="section-label">The Team</p>
          <h1 style={{ fontFamily:"var(--font-head)", fontSize:"clamp(40px,5vw,64px)", fontWeight:700, lineHeight:1.1, letterSpacing:"-0.02em" }}>
            People
          </h1>
        </div>

        <div className="people-grid" style={{ marginBottom:100 }}>
          {PEOPLE.map((person, i) => (
            <div key={i} className="person-card">
              <div className="person-photo-wrap">
                {person.photo
                  ? <img src={person.photo} alt={person.name} style={{ width:120, height:120, borderRadius:14, objectFit:"cover", objectPosition: person.photoPosition || "center", display:"block" }} />
                  : <div className="person-photo-placeholder" style={{ background:COLORS[person.color].light, color:COLORS[person.color].base }}>{person.initials}</div>
                }
                <div className="person-role-badge" style={{ background:COLORS[person.color].light, color:COLORS[person.color].base }}>
                  {person.role}
                </div>
              </div>
              <div className="person-info">
                <h3>{person.name}</h3>
                <p className="person-title">{person.title}</p>
                {person.period && <p className="person-period">{person.period}</p>}
                <p>{person.bio}</p>
                <div className="person-links">
                  {[
                    { href: person.scholar, label: "Scholar", icon: <ScholarIcon />, target: "_blank" },
                    { href: person.github,  label: "GitHub",  icon: <GithubIcon />,  target: "_blank" },
                    { href: person.website, label: "Website", icon: <WebsiteIcon />, target: undefined },
                  ].map(({ href, label, icon, target }) => (
                    <a key={label} href={href} target={target} rel={target ? "noreferrer" : undefined}
                      className="person-link"
                      style={{ "--link-hover-color": COLORS[person.color].base, "--link-hover-bg": COLORS[person.color].light }}
                      onMouseOver={e => {
                        e.currentTarget.style.borderColor = COLORS[person.color].base;
                        e.currentTarget.style.color = COLORS[person.color].base;
                        e.currentTarget.style.background = COLORS[person.color].light;
                      }}
                      onMouseOut={e => {
                        e.currentTarget.style.borderColor = "";
                        e.currentTarget.style.color = "";
                        e.currentTarget.style.background = "";
                      }}
                    >
                      {icon} {label}
                    </a>
                  ))}
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <Footer />
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
